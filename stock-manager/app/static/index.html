<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager · Macros</title>
    <link rel="stylesheet" href="static/styles.css?v=0.14.17">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body data-theme="cream">

<div class="toast-container" id="toast-container"></div>

<!-- Mobile head bar -->
<div class="mobile-bar">
    <div class="brand">
        <div class="brand-mark">S</div>
        <div>
            <div class="brand-name">Stock Manager</div>
        </div>
    </div>
</div>

<div class="app">
    <!-- Sidebar (desktop) -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-mark">S</div>
            <div>
                <div class="brand-name">Stock Manager</div>
                <div class="brand-sub">macros & pantry</div>
            </div>
        </div>
        <nav id="nav-items"></nav>
        <div class="sidebar-footer">
            <div class="avatar">M</div>
            <div style="min-width:0; flex:1;">
                <div style="font-size:13px; font-weight:600;">Mi plan</div>
                <div class="sync-badge" style="margin-top:2px;">
                    <span class="sync-dot"></span>
                    Conectado a HA
                </div>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="page-root">
        <!-- View HTML rendered here by JS -->
    </main>
</div>

<!-- Mobile tab bar -->
<nav class="tabbar" id="tabbar"></nav>

<!-- Modal mount -->
<div id="modal-mount"></div>

<script>
  // Global scope safety hooks
  window.filteredLocation = null;
  // API base resolved from Home Assistant ingress URL
  window.API_BASE = `${window.location.pathname.replace(/\/$/, '')}/api`;
</script>

<!-- Vendor libs (only needed by scanner.js for real barcode reading) -->
<script src="https://unpkg.com/html5-qrcode" defer></script>

<!-- Core (load order matters: data libs, then state, then components, then views, then main) -->
<script src="static/js/api.js?v=0.14.17"></script>
<script src="static/js/icons.js?v=0.14.17"></script>
<script src="static/js/state.js?v=0.14.17"></script>
<script src="static/js/components.js?v=0.14.17"></script>
<script src="static/js/navigation.js?v=0.14.17"></script>
<script src="static/js/view-today.js?v=0.14.17"></script>
<script src="static/js/view-week.js?v=0.14.17"></script>
<script src="static/js/view-pantry.js?v=0.14.17"></script>
<script src="static/js/view-recipes.js?v=0.14.17"></script>
<script src="static/js/view-shopping.js?v=0.14.17"></script>
<script src="static/js/view-settings.js?v=0.14.17"></script>
<script src="static/js/view-scan.js?v=0.14.17"></script>
<script src="static/js/view-scales.js?v=0.14.17"></script>
<script src="static/js/view-charts.js?v=0.14.17"></script>
<script src="static/js/cook-session.js?v=0.14.17"></script>
<script src="static/js/main.js?v=0.14.17"></script>

</body>
</html>
